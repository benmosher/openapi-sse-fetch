openapi: 3.2.0
info:
  title: Chat API
  version: 1.0.0
servers:
  - url: https://api.example.com/v1
paths:
  /chat/completions:
    post:
      operationId: postChatCompletions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatCompletionRequest'
      responses:
        '200':
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: object
                itemSchema:
                  oneOf:
                    - type: object
                      properties:
                        event:
                          type: string
                          const: message
                        data:
                          type: string
                          contentMediaType: application/json
                          contentSchema:
                            $ref: '#/components/schemas/ChatMessage'
                        id:
                          type: string
                    - type: object
                      properties:
                        event:
                          type: string
                          const: done
                        data:
                          type: string
                    - type: object
                      properties:
                        event:
                          type: string
                          const: error
                        data:
                          type: string
                          contentMediaType: application/json
                          contentSchema:
                            $ref: '#/components/schemas/ApiError'
                        id:
                          type: string
  /models/{modelId}/events:
    get:
      operationId: getModelEvents
      parameters:
        - name: modelId
          in: path
          required: true
          schema:
            type: string
        - name: since
          in: query
          required: false
          schema:
            type: string
            description: ISO 8601 timestamp; only return events after this time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            description: Maximum number of events to stream
      responses:
        '200':
          description: SSE stream of model events
          content:
            text/event-stream:
              schema:
                type: object
                itemSchema:
                  oneOf:
                    - type: object
                      properties:
                        event:
                          type: string
                          const: status
                        data:
                          type: string
                          contentMediaType: application/json
                          contentSchema:
                            $ref: '#/components/schemas/ModelStatus'
                        id:
                          type: string
                    - type: object
                      properties:
                        event:
                          type: string
                          const: metric
                        data:
                          type: string
                          contentMediaType: application/json
                          contentSchema:
                            $ref: '#/components/schemas/ModelMetric'
                        id:
                          type: string
components:
  schemas:
    ChatCompletionRequest:
      type: object
      title: ChatCompletionRequest
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
        stream:
          type: boolean
    Message:
      type: object
      title: Message
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum:
            - user
            - assistant
            - system
        content:
          type: string
    ChatMessage:
      type: object
      title: ChatMessage
      required:
        - content
      properties:
        content:
          type: string
        role:
          type: string
        finish_reason:
          type: string
    ApiError:
      type: object
      title: ApiError
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    ModelStatus:
      type: object
      title: ModelStatus
      required:
        - state
      properties:
        state:
          type: string
          enum:
            - loading
            - ready
            - error
        message:
          type: string
    ModelMetric:
      type: object
      title: ModelMetric
      required:
        - name
        - value
      properties:
        name:
          type: string
        value:
          type: number
        unit:
          type: string
